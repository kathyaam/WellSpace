    <h2 style="color: #2f4156;">Today's date is: <span id="datetime-display"></span></h2>
    <script>
    // Function to display the current date and time
    function displayDateTime() {
        const datetimeDisplayElement = document.getElementById('datetime-display');
        const currentDateTime = new Date();
        // Format the date and time using user's locale for a readable format
        datetimeDisplayElement.textContent = currentDateTime.toLocaleString(); 
    }

    // Call the function immediately to display the time when the page loads
    displayDateTime();

    // Update the date and time every second (1000 milliseconds)
    setInterval(displayDateTime, 1000);
</script>

    <div class="card container-lg" style="background-color: #cfdde5;">

    <h3 style="color: #2f4156;">Add your symptoms here</h3>
    <select id="select-symptom" style="color: #2f4156;">
  <option value="" disabled selected style="color: #2f4156;">Type of symptom</option>
  <option value="Headache" style="color: #2f4156;">Headache</option>
  <option value="Dizziness" style="color: #2f4156;">Dizziness</option>
  <option value="Tummy ache" style="color: #2f4156;">Tummy ache</option>
</select>

<select id="select-intensity" style="color: #2f4156;">
  <option value="" disabled selected style="color: #2f4156;">Intensity</option>
  <option value="1" style="color: #2f4156;">☺️ 1 - Really low</option>
  <option value="2" style="color: #2f4156;">🙂 2 - Low</option>
  <option value="3" style="color: #2f4156;">🫤 3 - Mid</option>
  <option value="4" style="color: #2f4156;">🙁 4 - High</option>
  <option value="5" style="color: #2f4156;">😟 5 - Really high</option>
</select>

<input type="datetime-local" id="select-time" />
<textarea id="select-notes" placeholder="Add notes (optional)" rows="3"></textarea>
<button id="save-btn" onclick="addEntry()" >Save symptom</button>
